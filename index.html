<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD-AS模型知识抢答挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5), 0 0 40px rgba(59, 130, 246, 0.3);
        }
        
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .option-btn.correct {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #34d399;
            animation: correctPulse 0.6s ease;
        }
        
        .option-btn.wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #f87171;
            animation: shake 0.5s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .timer-bar {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            height: 100%;
            transition: width 0.1s linear;
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .chart-icon {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            opacity: 0;
        }
        
        @keyframes particleExplosion {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        .streak-indicator {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="text-white">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl floating"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl floating" style="animation-delay: -3s;"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- 主容器 -->
    <div class="relative z-10 container mx-auto px-4 py-8 max-w-4xl">
        
        <!-- 标题区域 -->
        <header class="text-center mb-8">
            <h1 class="text-5xl md:text-6xl font-black mb-2 tracking-tight">
                <span class="chart-icon">AD-AS</span> 
                <span class="text-white">知识抢答</span>
            </h1>
            <p class="text-slate-400 text-lg">宏观经济学总需求-总供给模型挑战赛</p>
        </header>

        <!-- 开始界面 -->
        <div id="startScreen" class="glass-panel rounded-3xl p-8 md:p-12 text-center">
            <div class="mb-8">
                <div class="inline-block p-6 rounded-full bg-gradient-to-br from-blue-500/20 to-purple-500/20 mb-4">
                    <svg class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold mb-4">准备好挑战了吗？</h2>
                <p class="text-slate-300 mb-6 max-w-lg mx-auto">
                    测试你对AD-AS模型的掌握程度！包含单选题、判断题和图形分析题。
                    <br><span class="text-blue-400">连续答对可获得连击加分！</span>
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 max-w-2xl mx-auto">
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                    <div class="text-2xl font-bold text-blue-400">15题</div>
                    <div class="text-sm text-slate-400">题目数量</div>
                </div>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                    <div class="text-2xl font-bold text-purple-400">20秒</div>
                    <div class="text-sm text-slate-400">每题限时</div>
                </div>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                    <div class="text-2xl font-bold text-pink-400">连击×2</div>
                    <div class="text-sm text-slate-400">最高倍数</div>
                </div>
            </div>

            <button id="startBtn" type="button" class="group relative inline-flex items-center justify-center px-8 py-4 text-lg font-bold text-white transition-all duration-200 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full hover:from-blue-500 hover:to-purple-500 neon-glow hover:scale-105 active:scale-95 cursor-pointer">
                <span class="mr-2">开始挑战</span>
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" class="hidden">
            <!-- 状态栏 -->
            <div class="glass-panel rounded-2xl p-4 mb-6 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-6">
                    <div class="text-center">
                        <div class="text-xs text-slate-400 uppercase tracking-wider">得分</div>
                        <div id="scoreDisplay" class="text-3xl font-black text-blue-400">0</div>
                    </div>
                    <div class="h-8 w-px bg-slate-700"></div>
                    <div class="text-center">
                        <div class="text-xs text-slate-400 uppercase tracking-wider">题目</div>
                        <div class="text-2xl font-bold"><span id="currentQuestion">1</span><span class="text-slate-500">/</span><span id="totalQuestions">15</span></div>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div id="streakDisplay" class="hidden flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-orange-500/20 to-red-500/20 rounded-full border border-orange-500/30">
                        <span class="text-2xl">🔥</span>
                        <span class="streak-indicator text-xl" id="streakCount">×2</span>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-slate-400 uppercase tracking-wider">剩余时间</div>
                        <div id="timerDisplay" class="text-2xl font-bold text-white">20</div>
                    </div>
                </div>
            </div>

            <!-- 计时条 -->
            <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden mb-6">
                <div id="timerBar" class="timer-bar" style="width: 100%"></div>
            </div>

            <!-- 题目区域 -->
            <div class="glass-panel rounded-3xl p-6 md:p-10 mb-6 relative overflow-hidden">
                <div id="questionContainer">
                    <div class="mb-2">
                        <span id="questionType" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-blue-500/20 text-blue-300 border border-blue-500/30">单选题</span>
                    </div>
                    <h3 id="questionText" class="text-xl md:text-2xl font-bold mb-6 leading-relaxed"></h3>
                    
                    <!-- 图形题专用容器 -->
                    <div id="graphContainer" class="hidden mb-6 p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                        <canvas id="asAdCanvas" width="400" height="300" class="w-full max-w-md mx-auto"></canvas>
                    </div>

                    <div id="optionsContainer" class="grid grid-cols-1 gap-3">
                        <!-- 选项将动态插入 -->
                    </div>
                </div>

                <!-- 反馈遮罩 -->
                <div id="feedbackOverlay" class="absolute inset-0 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
                    <div class="text-center transform scale-0 transition-transform duration-300" id="feedbackContent">
                        <div id="feedbackIcon" class="text-6xl mb-4"></div>
                        <div id="feedbackText" class="text-2xl font-bold mb-2"></div>
                        <div id="feedbackSub" class="text-slate-400"></div>
                    </div>
                </div>
            </div>

            <!-- 解析面板 -->
            <div id="explanationPanel" class="hidden glass-panel rounded-2xl p-6 border-l-4 border-blue-500">
                <div class="flex items-start gap-4">
                    <div class="p-2 bg-blue-500/20 rounded-lg">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-blue-400 mb-2">知识点解析</h4>
                        <p id="explanationText" class="text-slate-300 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结束界面 -->
        <div id="endScreen" class="hidden glass-panel rounded-3xl p-8 md:p-12 text-center">
            <div class="mb-8">
                <div id="endIcon" class="text-8xl mb-4">🏆</div>
                <h2 class="text-4xl font-black mb-2" id="endTitle">挑战完成！</h2>
                <p class="text-slate-400" id="endSubtitle">来看看你的成绩吧</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 max-w-3xl mx-auto">
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
                    <div class="text-3xl font-black text-blue-400 mb-1" id="finalScore">0</div>
                    <div class="text-xs text-slate-500 uppercase">最终得分</div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
                    <div class="text-3xl font-black text-green-400 mb-1" id="correctCount">0</div>
                    <div class="text-xs text-slate-500 uppercase">答对题数</div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
                    <div class="text-3xl font-black text-purple-400 mb-1" id="maxStreak">0</div>
                    <div class="text-xs text-slate-500 uppercase">最高连击</div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
                    <div class="text-3xl font-black text-yellow-400 mb-1" id="accuracy">0%</div>
                    <div class="text-xs text-slate-500 uppercase">正确率</div>
                </div>
            </div>

            <div id="rankBadge" class="inline-block px-6 py-3 rounded-full bg-gradient-to-r from-yellow-500/20 to-orange-500/20 border border-yellow-500/30 text-yellow-400 font-bold text-lg mb-8">
                经济学新秀
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="restartBtn" type="button" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold transition-all hover:scale-105 active:scale-95 cursor-pointer">
                    再次挑战
                </button>
                <button id="reviewBtn" type="button" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 rounded-full font-bold transition-all hover:scale-105 active:scale-95 cursor-pointer">
                    复习错题
                </button>
            </div>
        </div>

    </div>

    <script>
        // 题库 - AD-AS模型知识点
        const questionBank = [
            {
                type: "choice",
                question: "在AD-AS模型中，总需求曲线（AD曲线）向右下方倾斜的主要原因是？",
                options: [
                    "A. 财富效应、利率效应和汇率效应",
                    "B. 边际成本递增",
                    "C. 生产要素价格刚性",
                    "D. 技术进步"
                ],
                correct: 0,
                explanation: "AD曲线向右下方倾斜的三大效应：财富效应（物价下降→实际财富增加→消费增加）、利率效应（物价下降→实际货币供给增加→利率下降→投资增加）、汇率效应（物价下降→利率下降→资本外流→本币贬值→净出口增加）。"
            },
            {
                type: "choice",
                question: "长期总供给曲线（LRAS）的形状是？",
                options: [
                    "A. 向右上方倾斜",
                    "B. 水平线",
                    "C. 垂直于潜在产出水平",
                    "D. 向右下方倾斜"
                ],
                correct: 2,
                explanation: "长期总供给曲线是垂直的，位于潜在产出（充分就业产出）水平。因为在长期中，价格和工资具有完全弹性，产出由技术、资本、劳动等实际因素决定，与价格水平无关。"
            },
            {
                type: "choice",
                question: "当经济处于滞胀（Stagflation）状态时，表现为？",
                options: [
                    "A. 产出增加，物价上涨",
                    "B. 产出减少，物价上涨",
                    "C. 产出增加，物价下降",
                    "D. 产出减少，物价下降"
                ],
                correct: 1,
                explanation: "滞胀是指经济停滞（产出下降、失业增加）与通货膨胀（物价上涨）并存的状态。在AD-AS模型中，这通常由不利的供给冲击（如石油价格上涨）导致AS曲线左移引起。"
            },
            {
                type: "graph",
                question: "观察右图：如果政府增加财政支出，AD曲线将如何移动？",
                options: [
                    "A. 向左移动",
                    "B. 向右移动",
                    "C. 向上移动",
                    "D. 保持不变"
                ],
                correct: 1,
                explanation: "扩张性财政政策（增加政府支出或减税）会增加总需求，使AD曲线向右移动。这会导致短期内产出增加和价格水平上升。",
                graphType: "shift_ad_right"
            },
            {
                type: "tf",
                question: "短期总供给曲线（SRAS）向上倾斜是因为名义工资在短期内具有粘性（Sticky Wages）。",
                correct: true,
                explanation: "正确。名义工资粘性是短期总供给曲线向上倾斜的关键原因。当物价水平上升而名义工资不变时，实际工资下降，企业雇佣更多工人，产出增加。"
            },
            {
                type: "choice",
                question: "以下哪项会使短期总供给曲线（SRAS）向左移动？",
                options: [
                    "A. 技术进步",
                    "B. 原材料价格下降",
                    "C. 预期价格水平上升",
                    "D. 劳动力增加"
                ],
                correct: 2,
                explanation: "预期价格水平上升→工人要求更高名义工资→企业成本增加→SRAS左移。其他选项（技术进步、原材料降价、劳动力增加）都会使SRAS右移。"
            },
            {
                type: "choice",
                question: "在AD-AS模型中，经济长期均衡点是？",
                options: [
                    "A. AD与SRAS的交点",
                    "B. AD、SRAS和LRAS的共同交点",
                    "C. SRAS与LRAS的交点",
                    "D. 以上都不是"
                ],
                correct: 1,
                explanation: "长期均衡要求三个条件同时满足：产品市场均衡（AD=SRAS）、充分就业（产出=潜在产出）、价格稳定预期。因此是AD、SRAS和LRAS三线的共同交点。"
            },
            {
                type: "graph",
                question: "右图显示负向供给冲击（如油价暴涨）的影响。新的均衡点相对于原均衡点，产出和价格如何变化？",
                options: [
                    "A. 产出增加，价格上升",
                    "B. 产出减少，价格上升",
                    "C. 产出减少，价格下降",
                    "D. 产出不变，价格上升"
                ],
                correct: 1,
                explanation: "负向供给冲击使SRAS左移，新均衡点位于原均衡点左上方。这意味着产出减少（经济衰退）和价格水平上升（通货膨胀）同时发生，即滞胀。",
                graphType: "shift_as_left"
            },
            {
                type: "choice",
                question: "货币中性（Monetary Neutrality）在AD-AS模型中的含义是？",
                options: [
                    "A. 货币供给变化只影响短期产出",
                    "B. 货币供给变化只影响价格水平，不影响长期产出",
                    "C. 货币政策总是无效的",
                    "D. 货币供给变化同时影响产出和价格"
                ],
                correct: 1,
                explanation: "货币中性是指长期中货币供给的变化只影响名义变量（价格水平），不影响实际变量（产出、就业）。在AD-AS模型中，货币扩张使AD右移，短期产出增加，但长期中只导致价格上升，产出回到潜在水平。"
            },
            {
                type: "tf",
                question: "如果AD曲线比SRAS曲线更平坦，货币政策对产出的影响效果更大。",
                correct: true,
                explanation: "正确。AD曲线越平坦（或SRAS越陡峭），AD移动对产出的影响越大，对价格的影响越小。这反映了经济中价格调整的灵活性。"
            },
            {
                type: "choice",
                question: "以下哪项不属于总需求（AD）的组成部分？",
                options: [
                    "A. 消费（C）",
                    "B. 投资（I）",
                    "C. 政府购买（G）",
                    "D. 进口（M）"
                ],
                correct: 3,
                explanation: "AD = C + I + G + (X - M)，其中(X-M)是净出口。进口（M）是减去项，不属于AD的独立组成部分，而是作为NX的一部分。"
            },
            {
                type: "choice",
                question: "当经济处于LRAS右侧（产出>潜在产出），这被称为？",
                options: [
                    "A. 衰退缺口（Recessionary Gap）",
                    "B. 通胀缺口（Inflationary Gap）",
                    "C. 充分就业",
                    "D. 自然失业率"
                ],
                correct: 1,
                explanation: "通胀缺口是指实际产出超过潜在产出的情况。此时劳动力市场紧张，工资上涨压力大，SRAS会向左调整，推动经济回到长期均衡，但伴随着更高的价格水平。"
            },
            {
                type: "graph",
                question: "右图显示经济从短期均衡向长期均衡的调整过程。如果当前产出高于潜在产出，SRAS将如何移动？",
                options: [
                    "A. 向右移动",
                    "B. 向左移动",
                    "C. 向上移动",
                    "D. 不移动"
                ],
                correct: 1,
                explanation: "当产出>潜在产出时，劳动力市场过热导致名义工资上升，企业成本增加，SRAS向左（上）移动，直到产出回到潜在水平，价格水平进一步上升。",
                graphType: "adjustment_inflationary"
            },
            {
                type: "choice",
                question: "在AD-AS框架下，2008年金融危机导致的经济衰退最好解释为？",
                options: [
                    "A. SRAS左移",
                    "B. AD左移",
                    "C. LRAS左移",
                    "D. AD右移"
                ],
                correct: 1,
                explanation: "金融危机导致消费者和投资者信心下降，消费和投资减少，同时信贷紧缩，这些因素都使AD曲线左移，导致产出和物价同时下降（衰退）。"
            },
            {
                type: "tf",
                question: "理性预期学派认为，如果货币政策被预期到，即使在短期内也无法影响实际产出。",
                correct: true,
                explanation: "正确。理性预期学派认为，如果公众预期到货币扩张，会立即调整工资和价格，SRAS左移与AD右移同步发生，产出保持在潜在水平，只有价格水平上升（政策无效性命题）。"
            }
        ];

        // 游戏状态
        let gameState = {
            currentQuestion: 0,
            score: 0,
            streak: 0,
            maxStreak: 0,
            correctCount: 0,
            timeLeft: 20,
            timerInterval: null,
            questions: [],
            answers: []
        };

        // DOM 元素引用
        const elements = {
            startScreen: document.getElementById('startScreen'),
            gameScreen: document.getElementById('gameScreen'),
            endScreen: document.getElementById('endScreen'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn'),
            reviewBtn: document.getElementById('reviewBtn'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            currentQuestion: document.getElementById('currentQuestion'),
            totalQuestions: document.getElementById('totalQuestions'),
            timerDisplay: document.getElementById('timerDisplay'),
            timerBar: document.getElementById('timerBar'),
            streakDisplay: document.getElementById('streakDisplay'),
            streakCount: document.getElementById('streakCount'),
            questionType: document.getElementById('questionType'),
            questionText: document.getElementById('questionText'),
            optionsContainer: document.getElementById('optionsContainer'),
            graphContainer: document.getElementById('graphContainer'),
            explanationPanel: document.getElementById('explanationPanel'),
            explanationText: document.getElementById('explanationText'),
            feedbackOverlay: document.getElementById('feedbackOverlay'),
            feedbackContent: document.getElementById('feedbackContent'),
            feedbackIcon: document.getElementById('feedbackIcon'),
            feedbackText: document.getElementById('feedbackText'),
            feedbackSub: document.getElementById('feedbackSub'),
            finalScore: document.getElementById('finalScore'),
            correctCount: document.getElementById('correctCount'),
            maxStreak: document.getElementById('maxStreak'),
            accuracy: document.getElementById('accuracy'),
            endTitle: document.getElementById('endTitle'),
            endSubtitle: document.getElementById('endSubtitle'),
            endIcon: document.getElementById('endIcon'),
            rankBadge: document.getElementById('rankBadge')
        };

        // 初始化游戏
        function initGame() {
            console.log('Initializing game...');
            // 随机打乱题目
            gameState.questions = [...questionBank].sort(() => Math.random() - 0.5);
            gameState.currentQuestion = 0;
            gameState.score = 0;
            gameState.streak = 0;
            gameState.maxStreak = 0;
            gameState.correctCount = 0;
            gameState.answers = [];
            
            elements.totalQuestions.textContent = gameState.questions.length;
            elements.startScreen.classList.add('hidden');
            elements.endScreen.classList.add('hidden');
            elements.gameScreen.classList.remove('hidden');
            
            loadQuestion();
        }

        function startGame() {
            console.log('Starting game...');
            initGame();
        }

        function restartGame() {
            console.log('Restarting game...');
            initGame();
        }

        // 加载题目
        function loadQuestion() {
            console.log('Loading question:', gameState.currentQuestion);
            const q = gameState.questions[gameState.currentQuestion];
            
            // 更新UI
            elements.currentQuestion.textContent = gameState.currentQuestion + 1;
            elements.questionText.textContent = q.question;
            elements.scoreDisplay.textContent = gameState.score;
            
            // 设置题型标签
            const typeLabels = {
                'choice': '单选题',
                'tf': '判断题',
                'graph': '图形分析'
            };
            elements.questionType.textContent = typeLabels[q.type] || '单选题';
            
            // 重置选项容器
            elements.optionsContainer.innerHTML = '';
            
            // 处理图形题
            if (q.type === 'graph') {
                elements.graphContainer.classList.remove('hidden');
                setTimeout(() => drawGraph(q.graphType), 0);
            } else {
                elements.graphContainer.classList.add('hidden');
            }
            
            // 生成选项
            if (q.type === 'tf') {
                const tfOptions = [
                    { text: '正确（True）', value: true },
                    { text: '错误（False）', value: false }
                ];
                tfOptions.forEach((opt, idx) => {
                    const btn = createOptionButton(opt.text, idx, opt.value === q.correct);
                    elements.optionsContainer.appendChild(btn);
                });
            } else {
                q.options.forEach((opt, idx) => {
                    const btn = createOptionButton(opt, idx, idx === q.correct);
                    elements.optionsContainer.appendChild(btn);
                });
            }
            
            // 隐藏解析面板和反馈
            elements.explanationPanel.classList.add('hidden');
            hideFeedback();
            
            // 启动计时器
            startTimer();
        }

        function createOptionButton(text, index, isCorrect) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'option-btn w-full text-left px-6 py-4 rounded-xl bg-slate-800/80 border-2 border-slate-600 hover:border-blue-500 hover:bg-slate-700/80 text-white font-medium transition-all cursor-pointer';
            btn.textContent = text;
            btn.onclick = function() { selectAnswer(index, isCorrect); };
            return btn;
        }

        // 绘制图形
        function drawGraph(type) {
            const canvas = document.getElementById('asAdCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const padding = 50;
            const width = canvas.width - 2 * padding;
            const height = canvas.height - 2 * padding;
            
            // 坐标轴
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + height);
            ctx.lineTo(padding + width, padding + height);
            ctx.stroke();
            
            // 标签
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText('P', padding - 20, padding);
            ctx.fillText('Y', padding + width + 10, padding + height + 5);
            
            // LRAS
            const lrasX = padding + width * 0.6;
            ctx.strokeStyle = '#ef4444';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(lrasX, padding);
            ctx.lineTo(lrasX, padding + height);
            ctx.stroke();
            ctx.fillText('LRAS', lrasX + 5, padding + 20);
            ctx.setLineDash([]);
            
            if (type === 'shift_ad_right') {
                drawCurve(ctx, padding, padding + height, width, height, '#3b82f6', false, 'AD₁');
                drawCurve(ctx, padding + 30, padding + height, width, height, '#60a5fa', false, 'AD₂');
                drawArrow(ctx, padding + width * 0.4, padding + height * 0.5, padding + width * 0.4 + 40, padding + height * 0.5);
            } else if (type === 'shift_as_left') {
                drawSupplyCurve(ctx, padding, padding + height, width, height, '#10b981', false, 'SRAS₁');
                drawSupplyCurve(ctx, padding - 30, padding + height, width, height, '#34d399', false, 'SRAS₂');
                drawCurve(ctx, padding, padding + height, width, height, '#3b82f6', false, 'AD');
                markPoint(ctx, lrasX - 40, padding + height * 0.45, 'E₁');
                markPoint(ctx, lrasX - 70, padding + height * 0.35, 'E₂');
            } else if (type === 'adjustment_inflationary') {
                drawCurve(ctx, padding, padding + height, width, height, '#3b82f6', false, 'AD');
                drawSupplyCurve(ctx, padding, padding + height, width, height, '#10b981', false, 'SRAS₁');
                drawSupplyCurve(ctx, padding - 40, padding + height, width, height, '#34d399', true, 'SRAS₂');
                markPoint(ctx, lrasX + 20, padding + height * 0.4, 'E₁');
                markPoint(ctx, lrasX, padding + height * 0.35, 'E₂');
            }
        }

        function drawCurve(ctx, startX, startY, width, height, color, dashed, label) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            if (dashed) ctx.setLineDash([5, 5]);
            else ctx.setLineDash([]);
            
            ctx.beginPath();
            ctx.moveTo(startX + width * 0.2, startY - height * 0.9);
            ctx.quadraticCurveTo(startX + width * 0.5, startY - height * 0.5, startX + width * 0.9, startY - height * 0.1);
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(label, startX + width * 0.9 + 5, startY - height * 0.1);
        }

        function drawSupplyCurve(ctx, startX, startY, width, height, color, dashed, label) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            if (dashed) ctx.setLineDash([5, 5]);
            else ctx.setLineDash([]);
            
            ctx.beginPath();
            ctx.moveTo(startX + width * 0.1, startY - height * 0.1);
            ctx.quadraticCurveTo(startX + width * 0.4, startY - height * 0.4, startX + width * 0.8, startY - height * 0.8);
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(label, startX + width * 0.8 + 5, startY - height * 0.8);
        }

        function drawArrow(ctx, fromX, fromY, toX, toY) {
            ctx.strokeStyle = '#fbbf24';
            ctx.fillStyle = '#fbbf24';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            
            const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - 10 * Math.cos(angle - Math.PI/6), toY - 10 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(toX - 10 * Math.cos(angle + Math.PI/6), toY - 10 * Math.sin(angle + Math.PI/6));
            ctx.closePath();
            ctx.fill();
        }

        function markPoint(ctx, x, y, label) {
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fbbf24';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(label, x + 8, y - 8);
        }

        // 计时器
        function startTimer() {
            clearInterval(gameState.timerInterval);
            gameState.timeLeft = 20;
            updateTimerDisplay();
            
            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft -= 0.1;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    clearInterval(gameState.timerInterval);
                    timeUp();
                }
                updateTimerDisplay();
            }, 100);
        }

        function updateTimerDisplay() {
            elements.timerDisplay.textContent = Math.ceil(gameState.timeLeft);
            const percentage = (gameState.timeLeft / 20) * 100;
            elements.timerBar.style.width = percentage + '%';
            
            if (gameState.timeLeft <= 5) {
                elements.timerBar.style.background = '#ef4444';
            } else {
                elements.timerBar.style.background = 'linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899)';
            }
        }

        function timeUp() {
            showFeedback(false, "时间到！");
            gameState.streak = 0;
            updateStreak();
            
            setTimeout(() => {
                showExplanation();
                setTimeout(nextQuestion, 3000);
            }, 1500);
        }

        // 选择答案
        function selectAnswer(index, isCorrect) {
            clearInterval(gameState.timerInterval);
            
            const buttons = elements.optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
            
            buttons[index].classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) {
                buttons.forEach((btn, i) => {
                    const q = gameState.questions[gameState.currentQuestion];
                    let correctIndex;
                    if (q.type === 'tf') {
                        correctIndex = q.correct ? 0 : 1;
                    } else {
                        correctIndex = q.correct;
                    }
                    if (i === correctIndex) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            if (isCorrect) {
                gameState.streak++;
                if (gameState.streak > gameState.maxStreak) {
                    gameState.maxStreak = gameState.streak;
                }
                const multiplier = Math.min(1 + gameState.streak * 0.1, 2);
                const timeBonus = Math.floor(gameState.timeLeft * 2);
                const points = Math.floor((100 + timeBonus) * multiplier);
                gameState.score += points;
                gameState.correctCount++;
                
                showFeedback(true, `+${points}分！`);
                createParticles(buttons[index]);
            } else {
                gameState.streak = 0;
                showFeedback(false, "答错了...");
            }
            
            updateStreak();
            
            gameState.answers.push({
                question: gameState.questions[gameState.currentQuestion],
                correct: isCorrect,
                selected: index
            });
            
            setTimeout(() => {
                showExplanation();
                setTimeout(nextQuestion, 3000);
            }, 1500);
        }

        function updateStreak() {
            if (gameState.streak > 1) {
                elements.streakDisplay.classList.remove('hidden');
                elements.streakCount.textContent = `×${Math.min(1 + gameState.streak * 0.1, 2).toFixed(1)}`;
            } else {
                elements.streakDisplay.classList.add('hidden');
            }
        }

        function showFeedback(isCorrect, text) {
            elements.feedbackOverlay.classList.remove('opacity-0', 'pointer-events-none');
            elements.feedbackContent.classList.remove('scale-0');
            elements.feedbackContent.classList.add('scale-100');
            
            if (isCorrect) {
                elements.feedbackIcon.textContent = '✅';
                elements.feedbackText.textContent = '回答正确！';
                elements.feedbackText.className = 'text-2xl font-bold mb-2 text-green-400';
            } else {
                elements.feedbackIcon.textContent = '❌';
                elements.feedbackText.textContent = text;
                elements.feedbackText.className = 'text-2xl font-bold mb-2 text-red-400';
            }
            
            elements.feedbackSub.textContent = isCorrect ? `连击×${gameState.streak}` : '继续加油！';
        }

        function hideFeedback() {
            elements.feedbackOverlay.classList.add('opacity-0', 'pointer-events-none');
            elements.feedbackContent.classList.remove('scale-100');
            elements.feedbackContent.classList.add('scale-0');
        }

        function showExplanation() {
            const q = gameState.questions[gameState.currentQuestion];
            elements.explanationText.textContent = q.explanation;
            elements.explanationPanel.classList.remove('hidden');
            hideFeedback();
        }

        function nextQuestion() {
            gameState.currentQuestion++;
            
            if (gameState.currentQuestion >= gameState.questions.length) {
                endGame();
            } else {
                hideFeedback();
                loadQuestion();
            }
        }

        function endGame() {
            elements.gameScreen.classList.add('hidden');
            elements.endScreen.classList.remove('hidden');
            
            elements.finalScore.textContent = gameState.score;
            elements.correctCount.textContent = gameState.correctCount;
            elements.maxStreak.textContent = gameState.maxStreak;
            const accuracy = Math.round((gameState.correctCount / gameState.questions.length) * 100);
            elements.accuracy.textContent = accuracy + '%';
            
            if (accuracy >= 90) {
                elements.rankBadge.textContent = '🏆 经济学大师';
                elements.rankBadge.className = 'inline-block px-6 py-3 rounded-full bg-gradient-to-r from-yellow-400/20 to-amber-500/20 border border-yellow-400/30 text-yellow-400 font-bold text-lg mb-8';
                elements.endIcon.textContent = '👑';
                elements.endTitle.textContent = '完美通关！';
            } else if (accuracy >= 70) {
                elements.rankBadge.textContent = '🥈 经济学高手';
                elements.rankBadge.className = 'inline-block px-6 py-3 rounded-full bg-gradient-to-r from-slate-400/20 to-slate-300/20 border border-slate-400/30 text-slate-300 font-bold text-lg mb-8';
                elements.endIcon.textContent = '🎖️';
                elements.endTitle.textContent = '表现优秀！';
            } else if (accuracy >= 50) {
                elements.rankBadge.textContent = '📚 经济学学徒';
                elements.rankBadge.className = 'inline-block px-6 py-3 rounded-full bg-gradient-to-r from-blue-500/20 to-cyan-500/20 border border-blue-500/30 text-blue-400 font-bold text-lg mb-8';
                elements.endIcon.textContent = '📖';
                elements.endTitle.textContent = '继续加油！';
            } else {
                elements.rankBadge.textContent = '🔰 经济学新手';
                elements.rankBadge.className = 'inline-block px-6 py-3 rounded-full bg-gradient-to-r from-green-500/20 to-emerald-500/20 border border-green-500/30 text-green-400 font-bold text-lg mb-8';
                elements.endIcon.textContent = '🌱';
                elements.endTitle.textContent = '再接再厉！';
            }
        }

        function showReview() {
            const wrongCount = gameState.answers.filter(a => !a.correct).length;
            if (wrongCount === 0) {
                alert('太棒了！你没有答错任何题目！');
            } else {
                let review = `你答错了${wrongCount}道题。\n\n`;
                gameState.answers.forEach((a, i) => {
                    if (!a.correct) {
                        const q = a.question;
                        let correctAnswer;
                        if (q.type === 'tf') {
                            correctAnswer = q.correct ? '正确' : '错误';
                        } else {
                            correctAnswer = q.options[q.correct];
                        }
                        review += `第${i+1}题：${q.question.substring(0, 30)}...\n`;
                        review += `正确答案：${correctAnswer}\n\n`;
                    }
                });
                alert(review);
            }
        }

        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                particle.style.width = '10px';
                particle.style.height = '10px';
                particle.style.background = `hsl(${Math.random() * 60 + 120}, 100%, 50%)`;
                particle.style.borderRadius = '50%';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
                particle.style.animation = 'particleExplosion 0.8s ease-out forwards';
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, attaching event listeners');
            
            elements.startBtn.addEventListener('click', function(e) {
                console.log('Start button clicked');
                e.preventDefault();
                startGame();
            });
            
            elements.restartBtn.addEventListener('click', function(e) {
                console.log('Restart button clicked');
                e.preventDefault();
                restartGame();
            });
            
            elements.reviewBtn.addEventListener('click', function(e) {
                console.log('Review button clicked');
                e.preventDefault();
                showReview();
            });
        });
    </script>
</body>
</html>
